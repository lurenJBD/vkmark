name: Build ARM64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mingw-arm64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        install: >-
          git
        pacboy: >-
          toolchain:p
          meson:p
          ninja:p
          pkgconf:p
          vulkan-loader:p
          vulkan-headers:p
          glm:p
          assimp:p
          dlfcn:p
          clang:p

    - name: Configure vkmark
      run: |
        CC=clang CXX=clang++ meson setup build \
          --buildtype=release \
          -Ddebug=false \
          -Dxcb=false \
          -Dwayland=false \
          -Dkms=false \
          -Db_pch=false \
          --prefix="$PWD/install_vkmark_mingw_arm64"

    - name: Build and Install vkmark
      run: |
        ninja -C build
        meson install -C build

    - name: Show meson logs on failure
      if: failure()
      run: cat build/meson-logs/meson-log.txt

    - name: Bundle DLLs
      run: |
        BIN_DIR="install_vkmark_mingw_arm64"
        echo "Scanning for dependencies in $BIN_DIR..."
        
        # Since objdump only lists direct dependencies, we need to loop recursively
        # until no new dependencies are found.
        while true; do
            added_dlls=0
            mapfile -t targets < <(find "$BIN_DIR" -maxdepth 1 -type f \( -name "*.exe" -o -name "*.dll" \))
            for target in "${targets[@]}"; do
                deps=$(objdump -p "$target" 2>/dev/null | grep -i "DLL Name" | awk '{print $3}')
                for dep_name in $deps; do
                    # Ignore standard Windows system DLLs
                    if [[ "$dep_name" =~ ^(?i)(KERNEL32|KERNELBASE|ntdll|USER32|ADVAPI32|SHELL32|WS2_32|GDI32|CFGMGR32|msvcrt|ucrtbase|RPCRT4|sechost).*$ ]]; then
                        continue
                    fi
                    if [ ! -f "$BIN_DIR/$dep_name" ]; then
                        echo "  Missing dependency: $dep_name (required by $(basename "$target"))"
                        if [ -f "/clangarm64/bin/$dep_name" ]; then
                            cp "/clangarm64/bin/$dep_name" "$BIN_DIR/"
                            echo "    -> Bundled from /clangarm64/bin/"
                            added_dlls=1
                        elif [ -f "/usr/bin/$dep_name" ]; then
                            cp "/usr/bin/$dep_name" "$BIN_DIR/"
                            echo "    -> Bundled from /usr/bin/"
                            added_dlls=1
                        else
                            found_dep=$(find /clangarm64 /usr -name "$dep_name" -print -quit 2>/dev/null)
                            if [ -n "$found_dep" ]; then
                                cp "$found_dep" "$BIN_DIR/"
                                echo "    -> Bundled from $found_dep"
                                added_dlls=1
                            else
                                echo "    -> WARNING: Could not find $dep_name"
                            fi
                        fi
                    fi
                done
            done
            if [ "$added_dlls" -eq 0 ]; then
                break
            fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vkmark-mingw-arm64
        path: install_vkmark_mingw_arm64
        compression-level: 9
