name: Build ARM64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mingw-arm64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        install: >-
          git
        pacboy: >-
          toolchain:p
          meson:p
          ninja:p
          pkgconf:p
          vulkan-loader:p
          vulkan-headers:p
          glm:p
          assimp:p
          dlfcn:p
          clang:p

    - name: Configure vkmark
      run: |
        CC=clang CXX=clang++ meson setup build \
          --buildtype=release \
          -Ddebug=false \
          -Dxcb=false \
          -Dwayland=false \
          -Dkms=false \
          -Db_pch=false \
          --prefix="$PWD/install_vkmark_mingw_arm64"

    - name: Build and Install vkmark
      run: |
        ninja -C build
        meson install -C build

    - name: Show meson logs on failure
      if: failure()
      run: cat build/meson-logs/meson-log.txt

    - name: Bundle DLLs
      run: |
        BIN_DIR="install_vkmark_mingw_arm64"
        echo "Scanning for dependencies in $BIN_DIR..."
        
        # Capture the initial list of executables and DLLs so we don't infinitely process newly copied DLLs
        mapfile -t targets < <(find "$BIN_DIR" -maxdepth 1 -type f \( -name "*.exe" -o -name "*.dll" \))
        for target in "${targets[@]}"; do
            if [ -f "$target" ]; then
                echo "Processing $(basename "$target")..."
                echo "--- ldd output for $target ---"
                timeout 30s ldd "$target" || true
                echo "------------------------------"
                # Extract absolute MSYS2 paths directly from ldd output
                deps=$(timeout 30s ldd "$target" 2>/dev/null | grep "=>" | grep -v "not found" | awk '{print $3}' | grep -i -E "^(/clangarm64|/usr)/")
                echo "Parsed deps for $(basename "$target"):"
                echo "$deps"
                for dep_path in $deps; do
                    if [ -f "$dep_path" ]; then
                        dep_name=$(basename "$dep_path")
                        if [ ! -f "$BIN_DIR/$dep_name" ]; then
                            echo "  Bundling: $dep_name from $dep_path"
                            cp "$dep_path" "$BIN_DIR/"
                        fi
                    fi
                done
            fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vkmark-mingw-arm64
        path: install_vkmark_mingw_arm64
        compression-level: 9
