name: Build ARM64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-mingw-arm64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        install: >-
          git
        pacboy: >-
          toolchain:p
          meson:p
          ninja:p
          pkgconf:p
          vulkan-loader:p
          vulkan-headers:p
          glm:p
          assimp:p
          dlfcn:p
          clang:p

    - name: Configure vkmark
      run: |
        CC=clang CXX=clang++ meson setup build \
          --buildtype=release \
          -Ddebug=false \
          -Dxcb=false \
          -Dwayland=false \
          -Dkms=false \
          -Db_pch=false \
          --prefix="$PWD/install_vkmark_mingw_arm64"

    - name: Build and Install vkmark
      run: |
        ninja -C build
        meson install -C build

    - name: Show meson logs on failure
      if: failure()
      run: cat build/meson-logs/meson-log.txt

    - name: Bundle DLLs
      run: |
        BIN_DIR="install_vkmark_mingw_arm64"
        echo "Scanning for dependencies in $BIN_DIR..."
        
        # Scan all executables and DLLs in the directory
        for target in "$BIN_DIR"/*.exe "$BIN_DIR"/*.dll; do
            if [ -f "$target" ]; then
                echo "Processing $(basename "$target")..."
                echo "--- ldd output for $target ---"
                ldd "$target" || true
                echo "------------------------------"
                # Extract just the DLL filename
                deps=$(ldd "$target" 2>/dev/null | grep -i '\.dll' | grep -v -i 'c:/windows' | grep -v -i 'system32' | awk '{print $1}')
                echo "Parsed deps for $(basename "$target"):"
                echo "$deps"
                for dep_name in $deps; do
                    if [ ! -f "$BIN_DIR/$dep_name" ]; then
                        echo "  Looking for: $dep_name"
                        if [ -f "/clangarm64/bin/$dep_name" ]; then
                            cp "/clangarm64/bin/$dep_name" "$BIN_DIR/"
                            echo "    -> Bundled from /clangarm64/bin/"
                        elif [ -f "/usr/bin/$dep_name" ]; then
                            cp "/usr/bin/$dep_name" "$BIN_DIR/"
                            echo "    -> Bundled from /usr/bin/"
                        else
                            found_dep=$(find /clangarm64 /usr -name "$dep_name" -print -quit 2>/dev/null)
                            if [ -n "$found_dep" ]; then
                                cp "$found_dep" "$BIN_DIR/"
                                echo "    -> Bundled from $found_dep"
                            else
                                echo "    -> WARNING: Could not find $dep_name"
                            fi
                        fi
                    fi
                done
            fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vkmark-mingw-arm64
        path: install_vkmark_mingw_arm64
        compression-level: 9
